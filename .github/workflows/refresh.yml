name: Refresh OSINT Tools Radar

on:
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

concurrency:
  group: catalogue-metadata-refresh
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh exact metadata and render views
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .radar/scripts/refresh_metadata.py \
            --write \
            --snapshot \
            --drop-archived \
            --drop-stale-before 2020-01-01 \
            --delay 0.1
          python .radar/scripts/render_catalog.py --write
          python .radar/scripts/validate_catalog.py
          python .radar/scripts/market_report.py --output "$RUNNER_TEMP/market-watch.md"

      - name: Open or update metadata pull request
        id: changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          branch="automation/radar-metadata"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "+refs/heads/$branch:refs/remotes/origin/$branch" || true
          git checkout -B "$branch"
          git add osint-repositories.csv .radar/README.md .radar/data/candidates.csv .radar/data/snapshots.csv README.md EMERGING.md AGENTIC.md
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: refresh OSINT Tools Radar metadata"
          git push --force-with-lease origin "HEAD:refs/heads/$branch"
          pull_request=$(gh pr list --head "$branch" --state open --json number --jq '.[0].number // empty')
          if [ -z "$pull_request" ]; then
            gh pr create \
              --base "$BASE_BRANCH" \
              --head "$branch" \
              --title "chore: refresh OSINT Tools Radar metadata" \
              --body "Automated weekly metadata refresh. Review repository status changes and generated catalogue updates before merging."
          else
            gh pr edit "$pull_request" \
              --title "chore: refresh OSINT Tools Radar metadata" \
              --body "Automated weekly metadata refresh. Review repository status changes and generated catalogue updates before merging."
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create or update weekly market-watch issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title="OSINT Tools Radar Market Watch - $(date -u +%G-W%V)"
          issue=$(gh issue list --state open --search "$title in:title" --json number,title --jq ".[] | select(.title == \"$title\") | .number" | head -n 1)
          if [ -z "$issue" ]; then
            gh issue create --title "$title" --body-file "$RUNNER_TEMP/market-watch.md"
          else
            gh issue edit "$issue" --body-file "$RUNNER_TEMP/market-watch.md"
          fi
